name: dbt Production Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'dbt/**'

jobs:
  dbt-cd-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dbt
        run: |
          pip install dbt-snowflake

      - name: Build production models
        run: |
          dbt deps --project-dir ./dbt
          dbt build --project-dir ./dbt --target prod
